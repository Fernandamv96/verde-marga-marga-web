            <div className="relative"><img src={mockUser.avatar} alt={mockUser.name} className="w-20 h-20 rounded-2xl object-cover border-4 border-white/30 shadow-lg" /><div className="absolute -bottom-2 -right-2 w-8 h-8 bg-eco-gold rounded-full flex items-center justify-center text-lg">🌿</div></div>
            <div><h1 className="font-heading font-bold text-2xl">{mockUser.name}</h1><div className="flex items-center gap-2 mt-2"><span className="px-2 py-0.5 bg-white/20 rounded-full text-xs">Arbusto</span><span className="px-2 py-0.5 bg-eco-gold/30 rounded-full text-xs">Nivel {mockUser.level}</span></div></div>
          </div>
          <div className="bg-white/20 backdrop-blur-sm rounded-xl p-4">
            <div className="flex justify-between text-sm mb-2"><span>Progreso al nivel {mockUser.level + 1}</span><span>{mockUser.xp} / {mockUser.xpToNextLevel} XP</span></div>
            <div className="h-3 bg-white/20 rounded-full overflow-hidden"><div className="h-full bg-eco-gold rounded-full" style={{ width: '86%' }} /></div>
          </div>
        </div>
        <div className="mt-6 px-4 space-y-6">

            <div className="bg-white rounded-xl p-4 border border-gray-100 text-center"><div className="text-2xl mb-1">🔥</div><div className="text-2xl font-bold font-mono">{mockUser.streak} días</div><div className="text-sm text-gray-500">Racha actual</div></div>

          </div>
          <div className="space-y-3">
            <h2 className="font-heading font-semibold text-gray-800 flex items-center gap-2"><span className="text-eco-gold"><Icon name="Award" /></span>Logros</h2>
            <div className="grid grid-cols-2 gap-3">
              {mockAchievements.map((achievement) => (
                <div key={achievement.id} className={`relative bg-white rounded-xl p-4 border ${achievement.unlocked ? 'border-eco-gold/30 shadow-md' : 'border-gray-100 opacity-60'}`}>
                  <div className="text-3xl mb-2">{achievement.icon}</div>

              <button className="flex items-center gap-3 w-full p-4 text-left"><div className="w-10 h-10 rounded-xl bg-gray-50 flex items-center justify-center"><Icon name="Settings" /></div><span className="flex-1 font-medium text-gray-800">Configuración</span><Icon name="ChevronRight" /></button>
            </div>

          <div className="flex items-center gap-4"><div className="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center"><Icon name="Building2" /></div><div><h1 className="font-heading font-bold text-2xl">EcoRec Chile</h1><p className="text-white/80 text-sm">Panel Empresarial</p></div></div>

    const Modal = ({ isOpen, onClose, children }) => {

      return <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4" onClick={onClose}><div className="bg-white rounded-2xl w-full max-w-md overflow-hidden" onClick={e => e.stopPropagation()}>{children}</div></div>;
    };

    const ScanModal = ({ isOpen, onClose, onScanComplete }) => {
      const [step, setStep] = useState('idle');
      const handleScan = () => {
        setStep('scanning');
        setTimeout(() => { setStep('validating'); setTimeout(() => { setStep('success'); setTimeout(() => { onScanComplete(); onClose(); setStep('idle'); }, 1500); }, 1500); }, 1500);
      };
      return (
        <Modal isOpen={isOpen} onClose={onClose}>
          <div className="relative h-64 bg-gradient-to-b from-eco-green/20 to-eco-blue/20 flex items-center justify-center">
            <div className="relative w-48 h-48">
              <div className="absolute top-0 left-0 w-12 h-12 border-t-4 border-l-4 border-eco-green rounded-tl-xl" />
              <div className="absolute top-0 right-0 w-12 h-12 border-t-4 border-r-4 border-eco-green rounded-tr-xl" />
              <div className="absolute bottom-0 left-0 w-12 h-12 border-b-4 border-l-4 border-eco-green rounded-bl-xl" />
              <div className="absolute bottom-0 right-0 w-12 h-12 border-b-4 border-r-4 border-eco-green rounded-br-xl" />

                {step === 'validating' && <div className="text-5xl">⏳</div>}
                {step === 'success' && <div className="text-5xl text-eco-green"><Icon name="Check" /></div>}

            </div>
            <button onClick={onClose} className="absolute top-4 right-4 w-10 h-10 bg-white/80 rounded-full flex items-center justify-center"><Icon name="X" /></button>

            {step === 'idle' && <><h3 className="font-heading font-bold text-xl mb-2">Escanear QR</h3><p className="text-gray-500 text-sm mb-4">Aproxima el código QR del contenedor</p><button onClick={handleScan} className="w-full btn-primary">Iniciar Escaneo</button></>}
            {step === 'scanning' && <h3 className="font-heading font-bold text-xl">Escaneando...</h3>}
            {step === 'validating' && <h3 className="font-heading font-bold text-xl">Validando...</h3>}
            {step === 'success' && <><h3 className="font-heading font-bold text-xl mb-2">¡Reciclaje Registrado!</h3><div className="bg-eco-green/10 rounded-xl p-4 mb-4"><p className="text-sm text-gray-600">Peso registrado</p><p className="font-bold text-xl">1.2 kg</p><p className="text-sm text-eco-green mt-2">+18 EP</p></div></>}

        </Modal>
      );
    };

    const SuccessModal = ({ isOpen, onClose, points }) => (
      <Modal isOpen={isOpen} onClose={onClose}>
        <div className="p-8 text-center">
          <div className="w-20 h-20 mx-auto mb-4 bg-eco-green rounded-full flex items-center justify-center text-4xl">🎉</div>

          <button onClick={onClose} className="w-full btn-primary">Continuar</button>
        </div>
      </Modal>
    );

      const [currentPage, setCurrentPage] = useState('home');
      const [showScan, setShowScan] = useState(false);
      const [showSuccess, setShowSuccess] = useState(false);
      const [lastRedeemed, setLastRedeemed] = useState(null);
      const handleRedeem = (benefit) => { setLastRedeemed(benefit); setShowSuccess(true); };
      const handleScanComplete = () => {};
      const renderPage = () => {
        switch (currentPage) {
          case 'home': return <HomePage />;
          case 'recycling': return <RecyclingPage onScan={() => setShowScan(true)} />;
          case 'marketplace': return <MarketplacePage onRedeem={handleRedeem} />;
          case 'map': return <MapPage />;
          case 'profile': return <ProfilePage />;
          case 'enterprise': return <EnterprisePage />;
          case 'municipal': return <MunicipalPage />;
          default: return <HomePage />;
        }
      };
      const showBottomNav = !['enterprise', 'municipal'].includes(currentPage);
      return (
        <div className="min-h-screen bg-eco-light">
          {renderPage()}
          {showBottomNav && <BottomNav currentPage={currentPage} setCurrentPage={setCurrentPage} />}

            <div className="fixed top-4 left-4 z-50 flex gap-2">
              <button onClick={() => setCurrentPage('enterprise')} className={`px-4 py-2 rounded-xl text-sm font-medium transition-all ${currentPage === 'enterprise' ? 'bg-eco-blue text-white shadow-md' : 'bg-white text-gray-600'}`}>Empresa</button>

            </div>
          )}
          <ScanModal isOpen={showScan} onClose={() => setShowScan(false)} onScanComplete={handleScanComplete} />
          <SuccessModal isOpen={showSuccess} onClose={() => setShowSuccess(false)} points={lastRedeemed?.pointsCost} />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
